name: Web Build

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
  pull_request:
    branches: ["main"]
    paths:
      - "web/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.30.1"
          package_json_file: "web/package.json"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build admin
        working-directory: web
        run: pnpm --filter @drink/admin build

      - name: Build client
        working-directory: web
        run: pnpm --filter @drink/client build
